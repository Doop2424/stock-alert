<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주가 알림 설정</title>
<style>
  :root {
    --bg: #0b1210;
    --panel: #121b19;
    --panel-2: #182420;
    --border: #223330;
    --text: #e8efe9;
    --muted: #7fa895;
    --accent: #33d17a;
    --accent-dim: #1f8a52;
    --danger: #e5645a;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Pretendard, sans-serif;
    line-height: 1.5;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0 0 4px;
  }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; }

  details.settings {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  details.settings summary {
    padding: 14px 16px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
    list-style: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  details.settings summary::-webkit-details-marker { display: none; }
  .settings-body { padding: 4px 16px 16px; display: grid; gap: 10px; }

  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
  input[type=text], input[type=password], input[type=email], input[type=number] {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 9px 10px;
    font-size: 14px;
    font-family: inherit;
  }
  input:focus { outline: none; border-color: var(--accent-dim); }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin: 0 0 14px;
    font-weight: 700;
  }

  .stock-row {
    display: grid;
    grid-template-columns: 1fr 90px 110px 32px;
    gap: 8px;
    align-items: end;
    padding: 10px 0;
    border-top: 1px solid var(--border);
  }
  .stock-row:first-of-type { border-top: none; }
  .search-box { position: relative; }
  .code-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    margin-top: 3px;
    min-height: 14px;
  }
  select {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 9px 8px;
    font-size: 13px;
    font-family: inherit;
  }
  .remove-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--danger);
    border-radius: 7px;
    height: 38px;
    cursor: pointer;
    font-size: 16px;
  }
  .remove-btn:hover { background: rgba(229,100,90,0.1); }

  .dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 7px;
    margin-top: 4px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 10;
    display: none;
  }
  .dropdown.open { display: block; }
  .dropdown-item {
    padding: 9px 10px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
  }
  .dropdown-item:hover { background: rgba(51,209,122,0.1); }
  .dropdown-item .mkt { color: var(--muted); font-size: 11px; }

  .add-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--muted);
    border-radius: 7px;
    padding: 10px;
    margin-top: 12px;
    cursor: pointer;
    font-size: 13px;
  }
  .add-btn:hover { border-color: var(--accent-dim); color: var(--accent); }

  .save-btn {
    width: 100%;
    background: var(--accent);
    color: #06120c;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
  }
  .save-btn:hover { background: #3fe088; }
  .save-btn:disabled { opacity: 0.5; cursor: default; }

  .status {
    margin-top: 12px;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 7px;
    display: none;
  }
  .status.show { display: block; }
  .status.ok { background: rgba(51,209,122,0.12); color: var(--accent); }
  .status.err { background: rgba(229,100,90,0.12); color: var(--danger); }
  .status.loading { background: var(--panel-2); color: var(--muted); }

  .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .hint a { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <h1>📈 주가 기준가 알림 설정</h1>
  <div class="sub">종목을 검색해서 추가하고, 기준가에 도달하면 이메일로 알림을 받습니다.</div>

  <details class="settings" id="settingsPanel">
    <summary>⚙️ 저장소 연결 설정 <span id="connStatus" style="color: var(--muted);">▾</span></summary>
    <div class="settings-body">
      <div>
        <label>GitHub 아이디/저장소 (owner/repo)</label>
        <input type="text" id="repoInput" placeholder="Doop2424/stock-alert" value="Doop2424/stock-alert">
      </div>
      <div>
        <label>Personal Access Token</label>
        <input type="password" id="tokenInput" placeholder="ghp_..." autocomplete="off">
        <div class="hint">
          이 브라우저에만 저장되며 다른 곳으로 전송되지 않습니다.
          토큰이 없다면 <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">여기서 발급</a>
          (Repository access: 이 repo만 선택, Permissions → Contents: Read and write)
        </div>
      </div>
      <button class="add-btn" id="loadBtn" style="border-style:solid;">불러오기</button>
    </div>
  </details>

  <div class="card">
    <h2>종목 목록</h2>
    <div id="stockList"></div>
    <button class="add-btn" id="addStockBtn">+ 종목 추가</button>
  </div>

  <div class="card">
    <h2>알림 받을 이메일</h2>
    <input type="email" id="emailInput" placeholder="you@gmail.com">
  </div>

  <button class="save-btn" id="saveBtn">저장하기</button>
  <div class="status" id="statusBox"></div>
</div>

<script>
const STOCKS_URL = 'stocks.json';
let stockDB = [];
let currentSha = null;

fetch(STOCKS_URL).then(r => r.json()).then(data => { stockDB = data; });

function getSettings() {
  return {
    repo: document.getElementById('repoInput').value.trim(),
    token: document.getElementById('tokenInput').value.trim(),
  };
}

function saveSettingsToStorage() {
  const { repo, token } = getSettings();
  localStorage.setItem('sa_repo', repo);
  localStorage.setItem('sa_token', token);
}

function loadSettingsFromStorage() {
  const repo = localStorage.getItem('sa_repo');
  const token = localStorage.getItem('sa_token');
  if (repo) document.getElementById('repoInput').value = repo;
  if (token) document.getElementById('tokenInput').value = token;
}

function showStatus(msg, type) {
  const box = document.getElementById('statusBox');
  box.textContent = msg;
  box.className = 'status show ' + type;
}

function makeStockRow(stock) {
  stock = stock || { name: '', code: '', condition: 'above', target_price: '' };
  const row = document.createElement('div');
  row.className = 'stock-row';
  row.innerHTML = `
    <div class="search-box">
      <label>종목명 검색</label>
      <input type="text" class="stock-search" placeholder="예: 삼성전자" value="${stock.name || ''}" autocomplete="off">
      <div class="code-badge">${stock.code ? '코드: ' + stock.code : ''}</div>
      <div class="dropdown"></div>
    </div>
    <div>
      <label>조건</label>
      <select class="stock-condition">
        <option value="above" ${stock.condition === 'above' ? 'selected' : ''}>이상</option>
        <option value="below" ${stock.condition === 'below' ? 'selected' : ''}>이하</option>
      </select>
    </div>
    <div>
      <label>기준가(원)</label>
      <input type="number" class="stock-target" value="${stock.target_price || ''}" placeholder="70000">
    </div>
    <button class="remove-btn" title="삭제">✕</button>
  `;
  row.dataset.code = stock.code || '';

  const searchInput = row.querySelector('.stock-search');
  const dropdown = row.querySelector('.dropdown');
  const codeBadge = row.querySelector('.code-badge');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    row.dataset.code = '';
    codeBadge.textContent = '';
    if (q.length < 1) { dropdown.classList.remove('open'); return; }
    const matches = stockDB.filter(s => s.name.includes(q)).slice(0, 30);
    if (matches.length === 0) { dropdown.classList.remove('open'); return; }
    dropdown.innerHTML = matches.map(s =>
      `<div class="dropdown-item" data-code="${s.code}" data-name="${s.name}">
         <span>${s.name}</span><span class="mkt">${s.market} · ${s.code}</span>
       </div>`
    ).join('');
    dropdown.classList.add('open');
  });

  dropdown.addEventListener('click', (e) => {
    const item = e.target.closest('.dropdown-item');
    if (!item) return;
    searchInput.value = item.dataset.name;
    row.dataset.code = item.dataset.code;
    codeBadge.textContent = '코드: ' + item.dataset.code;
    dropdown.classList.remove('open');
  });

  document.addEventListener('click', (e) => {
    if (!row.contains(e.target)) dropdown.classList.remove('open');
  });

  row.querySelector('.remove-btn').addEventListener('click', () => row.remove());

  return row;
}

document.getElementById('addStockBtn').addEventListener('click', () => {
  document.getElementById('stockList').appendChild(makeStockRow());
});

async function loadConfig() {
  const { repo, token } = getSettings();
  if (!repo || !token) { showStatus('저장소와 토큰을 입력해주세요.', 'err'); return; }
  saveSettingsToStorage();
  showStatus('불러오는 중...', 'loading');
  try {
    const res = await fetch(`https://api.github.com/repos/${repo}/contents/config.json`, {
      headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
    });
    if (!res.ok) throw new Error(`불러오기 실패 (${res.status})`);
    const data = await res.json();
    currentSha = data.sha;
    const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));

    document.getElementById('emailInput').value = content.notify_email || '';
    const list = document.getElementById('stockList');
    list.innerHTML = '';
    (content.stocks || []).forEach(s => list.appendChild(makeStockRow(s)));

    showStatus('불러오기 완료.', 'ok');
    document.getElementById('settingsPanel').removeAttribute('open');
  } catch (e) {
    showStatus('오류: ' + e.message, 'err');
  }
}

async function saveConfig() {
  const { repo, token } = getSettings();
  if (!repo || !token) { showStatus('먼저 저장소 연결 설정에서 불러오기를 해주세요.', 'err'); return; }

  const rows = [...document.querySelectorAll('.stock-row')];
  const stocks = [];
  for (const row of rows) {
    const name = row.querySelector('.stock-search').value.trim();
    const code = row.dataset.code;
    const condition = row.querySelector('.stock-condition').value;
    const target = row.querySelector('.stock-target').value;
    if (!name) continue;
    if (!code) { showStatus(`"${name}" 종목을 검색 목록에서 선택해주세요.`, 'err'); return; }
    if (!target) { showStatus(`"${name}"의 기준가를 입력해주세요.`, 'err'); return; }
    stocks.push({ code, name, condition, target_price: Number(target) });
  }

  const email = document.getElementById('emailInput').value.trim();
  if (!email) { showStatus('알림 받을 이메일을 입력해주세요.', 'err'); return; }

  const newConfig = { notify_email: email, stocks };
  const contentStr = JSON.stringify(newConfig, null, 2);
  const contentB64 = btoa(unescape(encodeURIComponent(contentStr)));

  showStatus('저장하는 중...', 'loading');
  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;

  try {
    const res = await fetch(`https://api.github.com/repos/${repo}/contents/config.json`, {
      method: 'PUT',
      headers: {
        Authorization: `Bearer ${token}`,
        Accept: 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: 'config.json 업데이트 (웹 UI)',
        content: contentB64,
        sha: currentSha
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `저장 실패 (${res.status})`);
    }
    const data = await res.json();
    currentSha = data.content.sha;
    showStatus('저장 완료! 다음 실행부터 반영됩니다.', 'ok');
  } catch (e) {
    showStatus('오류: ' + e.message, 'err');
  } finally {
    saveBtn.disabled = false;
  }
}

document.getElementById('loadBtn').addEventListener('click', loadConfig);
document.getElementById('saveBtn').addEventListener('click', saveConfig);

loadSettingsFromStorage();
if (document.getElementById('repoInput').value && document.getElementById('tokenInput').value) {
  loadConfig();
} else {
  document.getElementById('settingsPanel').setAttribute('open', '');
  document.getElementById('stockList').appendChild(makeStockRow());
}
</script>
</body>
</html>
